name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Codex plugin
        run: python3 /home/agentrick/.codex/skills/.system/plugin-creator/scripts/validate_plugin.py .

      - name: Run tests
        run: python3 -m unittest -v
